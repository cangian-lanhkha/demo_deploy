<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-4">
        <div class="section-header">
            <h2><i class="bi bi-clock-history" style="color:#6366f1;"></i> Lịch sử đơn hàng</h2>
        </div>
        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
            <div class="card-glass p-5"><i class="bi bi-receipt-cutoff" style="font-size:3rem;color:#a78bfa;"></i>
                <h4 class="mt-3 text-muted">Chưa có đơn hàng nào</h4><a th:href="@{/books}"
                    class="btn btn-accent mt-2"><i class="bi bi-journal-bookmark"></i> Mua sách ngay</a>
            </div>
        </div>
        <div th:unless="${#lists.isEmpty(orders)}" class="card-glass overflow-hidden">
            <table class="table table-custom mb-0">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Ngày đặt</th>
                        <th>Tổng tiền</th>
                        <th>Thanh toán</th>
                        <th>Trạng thái</th>
                        <th>Chi tiết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td><span class="badge"
                                style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:9999px;"
                                th:text="'#' + ${order.id}">1</span></td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                        <td class="fw-bold" style="color:#e11d48;"
                            th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫
                        </td>
                        <td>
                            <span class="badge"
                                th:classappend="${order.paymentStatus?.name() == 'PAID'} ? 'bg-success' :
                                                   (${order.paymentStatus?.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-danger')"
                                th:text="${order.paymentStatus != null ? order.paymentStatus.displayName : '—'}">TT</span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                   (${order.status.name() == 'COMPLETED'} ? 'bg-success' :
                                                   (${order.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-info'))"
                                th:text="${order.status.displayName}">Trạng thái</span>
                        </td>
                        <td><a th:href="@{'/orders/' + ${order.id}}" class="btn btn-sm"
                                style="border-radius:9999px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;"><i
                                    class="bi bi-eye"></i> Xem</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: notifScript}"></script>
</body>

</html>
