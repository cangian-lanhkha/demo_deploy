<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-4">
        <div class="section-header">
            <h2><i class="bi bi-bag-heart-fill" style="color:#6366f1;"></i> Giỏ hàng</h2>
        </div>
        <div th:if="${error}" class="alert alert-danger" style="border-radius:12px;" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" style="border-radius:12px;" th:text="${success}"></div>
        <div th:if="${#lists.isEmpty(cart)}" class="text-center py-5">
            <div class="card-glass p-5"><i class="bi bi-cart-x" style="font-size:4rem; color:#a78bfa;"></i>
                <h4 class="mt-3 text-muted">Giỏ hàng trống</h4>
                <p class="text-muted">Hãy thêm sách vào giỏ hàng để tiếp tục mua sắm</p><a th:href="@{/books}"
                    class="btn btn-accent"><i class="bi bi-journal-bookmark"></i> Khám phá kho sách</a>
            </div>
        </div>
        <div th:unless="${#lists.isEmpty(cart)}">
            <div class="card-glass overflow-hidden mb-4">
                <table class="table table-custom mb-0">
                    <thead>
                        <tr>
                            <th>Sách</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:if="${item.book.image != null}" th:src="@{'/images/' + ${item.book.image}}"
                                        style="width:50px;height:65px;object-fit:cover;border-radius:10px;">
                                    <div><strong th:text="${item.book.title}">Tên sách</strong><br><small
                                            class="text-muted" th:text="${item.book.author}">Tác giả</small></div>
                                </div>
                            </td>
                            <td th:text="${#numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫
                            </td>
                            <td>
                                <form th:action="@{'/cart/update/' + ${item.book.id}}" method="post"
                                    class="d-flex align-items-center gap-1" style="width:120px;">
                                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="99"
                                        class="form-control form-control-sm text-center" style="border-radius:10px;">
                                    <button type="submit" class="btn btn-sm"
                                        style="border-radius:12px; background:#6366f1; color:white;"><i
                                            class="bi bi-check-lg"></i></button>
                                </form>
                            </td>
                            <td class="fw-bold" style="color:#e11d48;"
                                th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫
                            </td>
                            <td><a th:href="@{'/cart/remove/' + ${item.book.id}}" class="btn btn-sm btn-outline-danger"
                                    style="border-radius:10px;" onclick="return confirm('Bạn muốn xóa sách này?')"><i
                                        class="bi bi-trash3"></i></a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-glass p-4">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h4 class="mb-0">Tổng cộng: <span
                                style="background:linear-gradient(135deg,#e11d48,#c026d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;"
                                th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</span>
                        </h4>
                    </div>
                    <div class="col-md-6 text-md-end mt-3 mt-md-0">
                        <a th:href="@{/cart/clear}" class="btn btn-outline-secondary me-2" style="border-radius:9999px;"
                            onclick="return confirm('Bạn muốn xóa toàn bộ giỏ hàng?')"><i class="bi bi-trash3"></i> Xóa
                            giỏ</a>
                        <a th:href="@{/cart/checkout}" class="btn btn-accent btn-lg"><i
                                class="bi bi-credit-card-2-front"></i> Thanh toán</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: notifScript}"></script>
</body>

</html>
