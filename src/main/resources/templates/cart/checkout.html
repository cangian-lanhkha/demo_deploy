<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-4">
        <div class="section-header">
            <h2><i class="bi bi-credit-card-2-front-fill" style="color:#6366f1;"></i> Thanh toán</h2>
        </div>
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card-glass p-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-person-vcard" style="color:#6366f1;"></i> Thông tin giao
                        hàng</h5>
                    <form th:action="@{/payment/checkout}" method="post" id="checkoutForm">
                        <div class="mb-3"><label class="form-label fw-semibold">Họ và tên *</label><input type="text"
                                class="form-control" name="customerName" required style="border-radius:14px;"></div>
                        <div class="mb-3"><label class="form-label fw-semibold">Số điện thoại *</label><input
                                type="text" class="form-control" name="phone" required style="border-radius:14px;">
                        </div>
                        <div class="mb-3"><label class="form-label fw-semibold">Email</label><input type="email"
                                class="form-control" name="email" style="border-radius:14px;"></div>
                        <div class="mb-3"><label class="form-label fw-semibold">Địa chỉ giao hàng *</label><textarea
                                class="form-control" name="address" rows="3" required
                                style="border-radius:14px;"></textarea></div>
                        <div class="mb-3"><label class="form-label fw-semibold"><i class="bi bi-ticket-perforated"></i>
                                Mã giảm giá</label><input type="text" class="form-control" name="couponCode"
                                placeholder="Nhập mã giảm giá (nếu có)" style="border-radius:14px;"></div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold"><i class="bi bi-credit-card"></i> Phương thức thanh
                                toán</label>
                            <div class="row g-2 mt-2">
                                <div class="col-6 col-md-4">
                                    <label class="card-glass p-3 w-100 text-center payment-option"
                                        style="cursor:pointer;border:2px solid #6366f1;border-radius:16px;transition:all 0.3s;">
                                        <input type="radio" name="paymentMethod" value="qr" checked class="d-none">
                                        <i class="bi bi-qr-code" style="font-size:2rem;color:#6366f1;"></i>
                                        <div class="fw-semibold mt-1 small">QR Chuyển khoản</div>
                                    </label>
                                </div>
                                <div class="col-6 col-md-4">
                                    <label class="card-glass p-3 w-100 text-center payment-option"
                                        style="cursor:pointer;border:2px solid transparent;border-radius:16px;transition:all 0.3s;">
                                        <input type="radio" name="paymentMethod" value="momo" class="d-none">
                                        <i class="bi bi-wallet2" style="font-size:2rem;color:#a50064;"></i>
                                        <div class="fw-semibold mt-1 small" style="color:#a50064;">Ví MoMo</div>
                                    </label>
                                </div>
                                <div class="col-6 col-md-4">
                                    <label class="card-glass p-3 w-100 text-center payment-option"
                                        style="cursor:pointer;border:2px solid transparent;border-radius:16px;transition:all 0.3s;">
                                        <input type="radio" name="paymentMethod" value="vnpay" class="d-none">
                                        <i class="bi bi-bank" style="font-size:2rem;color:#0066b3;"></i>
                                        <div class="fw-semibold mt-1 small" style="color:#0066b3;">VNPay</div>
                                    </label>
                                </div>
                                <div class="col-6 col-md-4">
                                    <label class="card-glass p-3 w-100 text-center payment-option"
                                        style="cursor:pointer;border:2px solid transparent;border-radius:16px;transition:all 0.3s;">
                                        <input type="radio" name="paymentMethod" value="zalopay" class="d-none">
                                        <i class="bi bi-phone" style="font-size:2rem;color:#008fe5;"></i>
                                        <div class="fw-semibold mt-1 small" style="color:#008fe5;">ZaloPay</div>
                                    </label>
                                </div>
                                <div class="col-6 col-md-4">
                                    <label class="card-glass p-3 w-100 text-center payment-option"
                                        style="cursor:pointer;border:2px solid transparent;border-radius:16px;transition:all 0.3s;">
                                        <input type="radio" name="paymentMethod" value="cod" class="d-none">
                                        <i class="bi bi-truck" style="font-size:2rem;color:#22c55e;"></i>
                                        <div class="fw-semibold mt-1 small" style="color:#22c55e;">COD</div>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <script>
                            document.querySelectorAll('.payment-option').forEach(function (el) {
                                el.addEventListener('click', function () {
                                    document.querySelectorAll('.payment-option').forEach(function (e) {
                                        e.style.borderColor = 'transparent';
                                    });
                                    this.style.borderColor = '#6366f1';
                                    this.querySelector('input').checked = true;
                                });
                            });
                        </script>
                        <button type="submit" class="btn btn-accent btn-lg w-100 mt-2"><i
                                class="bi bi-shield-check"></i>
                            Tiến hành thanh toán</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="card-glass p-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-bag-check" style="color:#6366f1;"></i> Đơn hàng của bạn
                    </h5>
                    <div th:each="item : ${cart}"
                        class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <div><strong class="small" th:text="${item.book.title}">Tên sách</strong><br><small
                                class="text-muted" th:text="'x' + ${item.quantity}">x1</small></div>
                        <span class="fw-bold small" style="color:#e11d48;"
                            th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center pt-3 mt-2">
                        <h5 class="mb-0 fw-bold">Tổng cộng:</h5>
                        <h5 class="mb-0 fw-bold" style="color:#e11d48;"
                            th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</h5>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
