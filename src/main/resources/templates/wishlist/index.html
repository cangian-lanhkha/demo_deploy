<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-4">
        <div class="section-header">
            <h2><i class="bi bi-heart-fill" style="color:#e11d48;"></i> Danh sách yêu thích</h2>
            <p th:text="${wishlistItems != null ? #lists.size(wishlistItems) : 0} + ' cuốn sách'">0 cuốn sách</p>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${wishlistItems != null && !wishlistItems.isEmpty()}" class="row g-3">
            <div class="col-xl-3 col-lg-4 col-md-6" th:each="item : ${wishlistItems}">
                <div class="book-card position-relative">
                    <!-- Remove from wishlist -->
                    <form th:action="@{'/wishlist/toggle/' + ${item.book.id}}" method="post"
                        class="position-absolute top-0 end-0 m-2" style="z-index:10;">
                        <button type="submit" class="btn btn-sm btn-danger rounded-circle" title="Xóa khỏi yêu thích">
                            <i class="bi bi-heart-fill"></i>
                        </button>
                    </form>
                    <a th:href="@{'/books/' + ${item.book.id}}" class="text-decoration-none">
                        <div class="book-card-img">
                            <img th:if="${item.book.image != null}" th:src="@{'/images/' + ${item.book.image}}"
                                alt="Sách" loading="lazy">
                            <div th:unless="${item.book.image != null}" class="book-card-placeholder">
                                <i class="bi bi-journal-bookmark" style="font-size:2rem;"></i>
                            </div>
                            <span class="book-badge" th:if="${item.book.category != null}"
                                th:text="${item.book.category.name}">Danh mục</span>
                        </div>
                    </a>
                    <div class="book-card-body">
                        <a th:href="@{'/books/' + ${item.book.id}}" class="text-decoration-none text-dark">
                            <h6 class="book-card-title" th:text="${item.book.title}">Tên sách</h6>
                        </a>
                        <p class="book-card-author"
                            th:text="${item.book.author != null ? item.book.author : 'Chưa rõ tác giả'}">Tác giả</p>
                        <div class="d-flex align-items-center gap-1 mb-1 small">
                            <span th:each="i : ${#numbers.sequence(1, 5)}"
                                th:classappend="${i <= item.book.averageRating} ? 'text-warning' : 'text-muted'">
                                <i class="bi bi-star-fill"></i>
                            </span>
                            <span class="text-muted" th:text="'(' + ${item.book.totalReviews} + ')'"></span>
                        </div>
                        <div class="book-card-footer d-flex justify-content-between align-items-center">
                            <span class="book-card-price"
                                th:text="${item.book.price != null ? #numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'POINT') + ' ₫' : 'Liên hệ'}">0
                                ₫</span>
                            <form th:action="@{'/cart/add/' + ${item.book.id}}" method="post">
                                <button type="submit" class="btn btn-sm btn-accent">
                                    <i class="bi bi-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${wishlistItems == null || wishlistItems.isEmpty()}" class="text-center py-5">
            <div class="card-glass p-5">
                <i class="bi bi-heart" style="font-size:4rem; color:#e11d48; opacity:0.3;"></i>
                <h5 class="mt-3 text-muted">Chưa có sách yêu thích</h5>
                <p class="text-muted">Hãy khám phá kho sách và thêm vào danh sách yêu thích!</p>
                <a th:href="@{/books}" class="btn btn-accent"><i class="bi bi-journal-bookmark"></i> Khám phá ngay</a>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: notifScript}"></script>
</body>

</html>
