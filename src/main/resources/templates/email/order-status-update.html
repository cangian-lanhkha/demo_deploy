<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .status-box { background: #d4edda; border: 1px solid #c3e6cb; padding: 15px; border-radius: 5px; margin: 15px 0; text-align: center; }
        .status-box.cancelled { background: #f8d7da; border-color: #f5c6cb; }
        .order-info p { margin: 5px 0; }
        .footer { background: #f8f9fa; padding: 15px; text-align: center; color: #6c757d; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>BookStore</h1>
        <p>Cập nhật đơn hàng</p>
    </div>
    <div class="content">
        <p>Xin chào <strong th:text="${invoice.customerName}">Khách hàng</strong>,</p>
        <p>Đơn hàng <strong th:text="${invoice.orderCode}"></strong> của bạn đã được cập nhật trạng thái.</p>

        <div class="status-box" th:classappend="${invoice.status.name() == 'CANCELLED' or invoice.status.name() == 'REFUNDED'} ? 'cancelled' : ''">
            <h2 th:text="${invoice.status.displayName}">Trạng thái</h2>
        </div>

        <div class="order-info" th:if="${invoice.trackingNumber != null}">
            <p><strong>Mã vận đơn:</strong> <span th:text="${invoice.trackingNumber}"></span></p>
            <p th:if="${invoice.shippingProvider != null}"><strong>Đơn vị vận chuyển:</strong> <span th:text="${invoice.shippingProvider}"></span></p>
        </div>
    </div>
    <div class="footer">
        <p>Email này được gửi tự động. Vui lòng không trả lời.</p>
        <p>&copy; BookStore - Hệ thống bán sách trực tuyến</p>
    </div>
</div>
</body>
</html>
