<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card-glass p-4 text-center">
                    <div th:if="${success}">
                        <i class="bi bi-check-circle-fill" style="font-size:4rem;color:#22c55e;"></i>
                        <h3 class="mt-3 fw-bold">Đặt hàng thành công!</h3>
                        <p class="text-muted">Mã đơn hàng: <strong th:text="${orderCode}"></strong></p>
                        <p>Đơn hàng của bạn đã được ghi nhận qua <strong>ZaloPay</strong>.</p>
                        <p class="fw-bold" style="color:#e11d48;"
                           th:text="'Tổng thanh toán: ' + ${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                    </div>
                    <div th:unless="${success}">
                        <i class="bi bi-x-circle-fill" style="font-size:4rem;color:#ef4444;"></i>
                        <h3 class="mt-3 fw-bold">Thanh toán thất bại</h3>
                        <p class="text-muted" th:text="${message} ?: 'Giao dịch ZaloPay không thành công hoặc đã bị hủy.'"></p>
                    </div>
                    <a href="/" class="btn btn-accent mt-3"><i class="bi bi-house"></i> Về trang chủ</a>
                    <a th:if="${success}" th:href="@{/orders}" class="btn btn-outline-secondary mt-3"><i class="bi bi-bag"></i> Xem đơn hàng</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
