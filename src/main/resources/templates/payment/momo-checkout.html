<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-4">
        <div class="section-header">
            <h2><i class="bi bi-wallet2" style="color:#6366f1;"></i> Thanh toán MoMo</h2>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card-glass p-5 text-center">
                    <i class="bi bi-exclamation-triangle-fill" style="font-size:4rem;color:#f59e0b;"></i>
                    <h4 class="fw-bold mt-3">Không thể kết nối MoMo</h4>
                    <p class="text-muted" th:text="${momoError}">Đã xảy ra lỗi khi tạo đơn thanh toán MoMo.</p>
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <a th:href="@{/cart/checkout}" class="btn btn-accent"><i class="bi bi-arrow-clockwise"></i> Thử
                            lại</a>
                        <a th:href="@{/}" class="btn"
                            style="border-radius:9999px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;">
                            <i class="bi bi-house"></i> Trang chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
