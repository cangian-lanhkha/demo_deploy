<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card-glass p-5 text-center">
                    <!-- Success -->
                    <div th:if="${resultCode == '0'}">
                        <div
                            style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#10b981,#34d399);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.5rem;">
                            <i class="bi bi-check-lg" style="font-size:3rem;color:#fff;"></i>
                        </div>
                        <h3 class="fw-bold" style="font-family:'Outfit',sans-serif;">Thanh toán MoMo thành công!</h3>
                        <p class="text-muted mt-2 mb-0">Đơn hàng của bạn đã được xác nhận và đang được xử lý.</p>

                        <div class="mt-4 p-4 text-start"
                            style="background:#f0fdf4;border-radius:20px;border:1px solid #bbf7d0;">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Mã đơn hàng:</span>
                                <span class="badge fw-bold"
                                    style="background:linear-gradient(135deg,#a50064,#d63384);border-radius:9999px;font-size:0.85rem;"
                                    th:text="${orderId}">DH...</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Phương thức:</span>
                                <span class="fw-semibold"><i class="bi bi-wallet2" style="color:#a50064;"></i> Ví
                                    MoMo</span>
                            </div>
                        </div>

                        <div class="d-flex gap-3 justify-content-center mt-4">
                            <a th:href="@{/orders}" class="btn btn-accent btn-lg">
                                <i class="bi bi-receipt"></i> Xem đơn hàng
                            </a>
                            <a th:href="@{/}" class="btn btn-lg"
                                style="border-radius:9999px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;">
                                <i class="bi bi-house"></i> Trang chủ
                            </a>
                        </div>
                    </div>

                    <!-- Failed / Cancelled -->
                    <div th:if="${resultCode != '0'}">
                        <div
                            style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#e11d48,#f43f5e);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.5rem;">
                            <i class="bi bi-x-lg" style="font-size:3rem;color:#fff;"></i>
                        </div>
                        <h3 class="fw-bold" style="font-family:'Outfit',sans-serif;">Thanh toán MoMo không thành công
                        </h3>
                        <p class="text-muted mt-2" th:text="${message}">Giao dịch đã bị hủy hoặc gặp lỗi.</p>

                        <div class="d-flex gap-3 justify-content-center mt-4">
                            <a th:href="@{/cart/checkout}" class="btn btn-accent btn-lg">
                                <i class="bi bi-arrow-clockwise"></i> Thử lại
                            </a>
                            <a th:href="@{/}" class="btn btn-lg"
                                style="border-radius:9999px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;">
                                <i class="bi bi-house"></i> Trang chủ
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
