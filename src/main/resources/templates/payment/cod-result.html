<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card-glass p-4 text-center">
                    <i class="bi bi-truck" style="font-size:4rem;color:#22c55e;"></i>
                    <h3 class="mt-3 fw-bold">Đặt hàng thành công!</h3>
                    <p class="text-muted">Mã đơn hàng: <strong th:text="${orderCode}"></strong></p>

                    <div class="alert alert-info mt-3" style="border-radius:12px;">
                        <i class="bi bi-info-circle"></i>
                        <strong>Thanh toán khi nhận hàng (COD)</strong><br>
                        Bạn sẽ thanh toán cho nhân viên giao hàng khi nhận được hàng.
                    </div>

                    <div class="card-glass p-3 mt-3 text-start">
                        <p><strong>Khách hàng:</strong> <span th:text="${customerName}"></span></p>
                        <p><strong>SĐT:</strong> <span th:text="${phone}"></span></p>
                        <p><strong>Địa chỉ:</strong> <span th:text="${address}"></span></p>
                        <hr>
                        <div th:if="${discount != null and discount > 0}">
                            <p>Giảm giá: <strong th:text="'-' + ${#numbers.formatDecimal(discount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></strong></p>
                        </div>
                        <p class="fw-bold" style="color:#e11d48;font-size:1.2rem;"
                           th:text="'Tổng cộng: ' + ${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                    </div>

                    <a href="/" class="btn btn-accent mt-3"><i class="bi bi-house"></i> Về trang chủ</a>
                    <a th:href="@{/orders}" class="btn btn-outline-secondary mt-3"><i class="bi bi-bag"></i> Xem đơn hàng</a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
