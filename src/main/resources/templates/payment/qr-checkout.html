<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>
    <main class="container py-4">
        <div class="section-header">
            <h2><i class="bi bi-qr-code" style="color:#6366f1;"></i> Thanh toán QR</h2>
        </div>
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card-glass p-4 text-center">
                    <h5 class="fw-bold mb-3">Quét mã QR để thanh toán</h5>
                    <img th:src="${qrCodeUrl}" alt="QR Code"
                        style="max-width:300px;border-radius:20px;box-shadow:0 15px 40px rgba(99,102,241,0.12);"
                        class="mb-3">
                    <div class="text-start mt-3" style="background:#ede9fe;border-radius:20px;padding:1.3rem;">
                        <p class="mb-1"><strong>Ngân hàng:</strong> <span th:text="${bankCode}">MB</span></p>
                        <p class="mb-1"><strong>Số tài khoản:</strong> <span
                                th:text="${accountNumber}">0398702156</span></p>
                        <p class="mb-1"><strong>Chủ tài khoản:</strong> <span th:text="${accountName}">Name</span></p>
                        <p class="mb-1"><strong>Số tiền:</strong> <span class="fw-bold" style="color:#e11d48;"
                                th:text="${#numbers.formatDecimal(finalTotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0
                                ₫</span></p>
                        <p class="mb-0"><strong>Nội dung CK:</strong> <span class="badge"
                                style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:9999px;"
                                th:text="${orderCode}">DH...</span></p>
                    </div>
                    <div id="paymentStatus" class="alert alert-info mt-3" style="border-radius:12px;"><i
                            class="bi bi-hourglass-split"></i> Đang chờ thanh toán...</div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card-glass p-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-bag-check" style="color:#6366f1;"></i> Đơn hàng</h5>
                    <p><strong>Khách hàng:</strong> <span th:text="${customerName}">Tên</span></p>
                    <p><strong>Điện thoại:</strong> <span th:text="${phone}">SĐT</span></p>
                    <div th:each="item : ${cart}" class="d-flex justify-content-between py-2 border-bottom">
                        <small th:text="${item.book.title + ' x' + item.quantity}">Sách</small>
                        <small class="fw-bold"
                            th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0
                            ₫</small>
                    </div>
                    <div th:if="${discount > 0}" class="d-flex justify-content-between py-2 text-success"><span>Giảm
                            giá:</span><span
                            th:text="'-' + ${#numbers.formatDecimal(discount, 0, 'COMMA', 0, 'POINT') + ' ₫'}">-0
                            ₫</span></div>
                    <div class="d-flex justify-content-between pt-3 mt-2">
                        <h5 class="mb-0 fw-bold">Thanh toán:</h5>
                        <h5 class="mb-0 fw-bold" style="color:#e11d48;"
                            th:text="${#numbers.formatDecimal(finalTotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</h5>
                    </div>
                </div>
                <form th:action="@{/payment/confirm}" method="post" id="confirmForm" style="display:none;" class="mt-3">
                    <button type="submit" class="btn btn-accent btn-lg w-100"><i class="bi bi-check-circle"></i> Xác
                        nhận đã thanh toán</button>
                </form>
                <div class="mt-3">
                    <button type="button" class="btn btn-lg w-100" id="cancelPaymentBtn"
                        style="border-radius:9999px;background:linear-gradient(135deg,#64748b,#94a3b8);color:#fff;border:none;cursor:pointer;">
                        <i class="bi bi-x-circle"></i> Hủy thanh toán
                    </button>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        setInterval(function () {
            fetch('/payment/check-status').then(r => r.json()).then(data => {
                let el = document.getElementById('paymentStatus');
                if (data.paid) {
                    el.className = 'alert alert-success mt-3'; el.style.borderRadius = '12px';
                    el.innerHTML = '<i class="bi bi-check-circle-fill"></i> Thanh toán thành công!';
                    document.getElementById('confirmForm').style.display = 'block';
                }
            });
        }, 5000);

        document.getElementById('cancelPaymentBtn').addEventListener('click', function () {
            if (confirm('Bạn muốn hủy thanh toán và quay lại giỏ hàng?')) {
                window.location.href = '/cart';
            }
        });
    </script>
</body>

</html>
