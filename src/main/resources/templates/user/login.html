<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BookStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-book-half"
                    style="font-size:2.5rem; background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
                <h2>Đăng nhập</h2>
                <p class="text-muted">Chào mừng bạn quay trở lại BookStore</p>
            </div>
            <div class="alert alert-success" th:if="${param.registered}" style="border-radius:12px;"><i
                    class="bi bi-check-circle"></i> Đăng ký thành công! Hãy đăng nhập.</div>
            <div class="alert alert-info" th:if="${param.logout}" style="border-radius:12px;"><i
                    class="bi bi-box-arrow-right"></i> Đã đăng xuất thành công.</div>
            <div class="alert alert-danger" th:if="${param.error}" style="border-radius:12px;"><i
                    class="bi bi-exclamation-triangle"></i> Sai tên đăng nhập hoặc mật khẩu!</div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3"><label class="form-label fw-semibold">Tên đăng nhập</label><input type="text"
                        name="username" class="form-control" required autofocus
                        style="border-radius:14px; padding:0.75rem;"></div>
                <div class="mb-3"><label class="form-label fw-semibold">Mật khẩu</label><input type="password"
                        name="password" class="form-control" required style="border-radius:14px; padding:0.75rem;">
                </div>
                <button type="submit" class="btn btn-accent btn-lg w-100 mt-2"><i class="bi bi-box-arrow-in-right"></i>
                    Đăng nhập</button>
            </form>
            <div class="text-center mt-3">
                <p class="text-muted">Chưa có tài khoản? <a th:href="@{/register}"
                        style="color:#6366f1; font-weight:600;">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>
</body>

</html>
