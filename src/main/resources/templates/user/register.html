<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BookStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill"
                    style="font-size:2.5rem; background:linear-gradient(135deg,#e11d48,#c026d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
                <h2>Đăng ký</h2>
                <p class="text-muted">Tạo tài khoản miễn phí tại BookStore</p>
            </div>
            <form th:action="@{/register}" method="post" th:object="${user}">
                <div class="mb-3"><label class="form-label fw-semibold">Tên đăng nhập *</label><input type="text"
                        th:field="*{username}" class="form-control" required
                        style="border-radius:14px; padding:0.75rem;"><small class="text-danger"
                        th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Error</small></div>
                <div class="mb-3"><label class="form-label fw-semibold">Mật khẩu *</label><input type="password"
                        th:field="*{password}" class="form-control" required
                        style="border-radius:14px; padding:0.75rem;"><small class="text-danger"
                        th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</small></div>
                <div class="mb-3"><label class="form-label fw-semibold">Email</label><input type="email"
                        th:field="*{email}" class="form-control" style="border-radius:14px; padding:0.75rem;"><small
                        class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</small>
                </div>
                <div class="mb-3"><label class="form-label fw-semibold">Số điện thoại</label><input type="text"
                        th:field="*{phone}" class="form-control" style="border-radius:14px; padding:0.75rem;"></div>
                <button type="submit" class="btn btn-accent btn-lg w-100 mt-2"><i class="bi bi-person-check"></i> Đăng
                    ký</button>
            </form>
            <div class="text-center mt-3">
                <p class="text-muted">Đã có tài khoản? <a th:href="@{/login}"
                        style="color:#6366f1; font-weight:600;">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</body>

</html>
