<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/admin-layout :: adminHead}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>
    <div th:replace="~{fragments/admin-layout :: topbar}"></div>
    <div class="admin-content">
        <div class="admin-page-header">
            <h3>👥 Quản lý người dùng</h3>
            <p>Xem và quản lý vai trò người dùng</p>
        </div>
        <div th:if="${success}" class="alert alert-success" style="border-radius:12px;" th:text="${success}">OK</div>
        <div th:if="${error}" class="alert alert-danger" style="border-radius:12px;" th:text="${error}">Error</div>
        <div class="admin-table-wrapper">
            <div class="admin-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Điện thoại</th>
                            <th>Vai trò</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td class="fw-semibold" th:text="${user.username}">user</td>
                            <td th:text="${user.email}">email</td>
                            <td th:text="${user.phone}">phone</td>
                            <td><span th:each="role : ${user.roles}" class="badge me-1"
                                    th:style="${role.name == 'ADMIN'} ? 'background:linear-gradient(135deg,#e11d48,#c026d3);border-radius:9999px;' : 'background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:9999px;'"
                                    th:text="${role.name}">ROLE</span></td>
                            <td>
                                <form th:action="@{'/admin/users/' + ${user.id} + '/roles'}" method="post"
                                    class="d-inline" th:if="${user.username != currentAdmin}">
                                    <div class="d-flex gap-1 align-items-center">
                                        <th:block th:each="role : ${allRoles}">
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="checkbox" name="roles"
                                                    th:value="${role.name}" th:checked="${user.roles.contains(role)}">
                                                <label class="form-check-label small"
                                                    th:text="${role.name}">ROLE</label>
                                            </div>
                                        </th:block>
                                        <button type="submit" class="btn btn-sm btn-admin-primary"><i
                                                class="bi bi-check"></i></button>
                                    </div>
                                </form>
                                <span th:if="${user.username == currentAdmin}" class="text-muted small">Tài khoản hiện
                                    tại</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>function toggleSidebar() { document.getElementById('adminSidebar').classList.toggle('show'); }</script>
    <script>document.getElementById('link-users').classList.add('active');</script>
</body>

</html>
