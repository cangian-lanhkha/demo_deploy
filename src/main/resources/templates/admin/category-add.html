<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: adminHead}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>
    <div th:replace="~{fragments/admin-layout :: topbar}"></div>
    <div class="admin-content">
        <div class="admin-page-header">
            <h3>➕ Thêm danh mục</h3>
        </div>
        <div class="admin-card" style="max-width:500px;">
            <form th:action="@{/admin/categories/add}" method="post" th:object="${category}">
                <div class="mb-3"><label class="form-label fw-semibold">Tên danh mục *</label><input type="text"
                        th:field="*{name}" class="form-control" required style="border-radius:12px;"><small
                        class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</small></div>
                <div class="d-flex gap-2"><button type="submit" class="btn btn-admin-primary"><i
                            class="bi bi-check-circle"></i> Thêm</button><a th:href="@{/admin/categories}"
                        class="btn btn-outline-secondary" style="border-radius:12px;">Hủy</a></div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>function toggleSidebar() { document.getElementById('adminSidebar').classList.toggle('show'); }</script>
</body>

</html>
