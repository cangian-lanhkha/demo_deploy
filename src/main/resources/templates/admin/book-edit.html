<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: adminHead}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>
    <div th:replace="~{fragments/admin-layout :: topbar}"></div>
    <div class="admin-content">
        <div class="admin-page-header">
            <h3>✏️ Chỉnh sửa sách</h3>
            <p>Cập nhật thông tin sách</p>
        </div>
        <div class="admin-card" style="max-width:700px;">
            <form th:action="@{/admin/books/edit}" method="post" enctype="multipart/form-data" th:object="${book}">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{image}">
                <div class="mb-3"><label class="form-label fw-semibold">Tiêu đề sách *</label><input type="text"
                        th:field="*{title}" class="form-control" required style="border-radius:12px;"><small
                        class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Error</small>
                </div>
                <div class="mb-3"><label class="form-label fw-semibold">Tác giả</label><input type="text"
                        th:field="*{author}" class="form-control" style="border-radius:12px;"></div>
                <div class="mb-3"><label class="form-label fw-semibold">Giá (VNĐ)</label><input type="number"
                        th:field="*{price}" class="form-control" min="0" step="1000" style="border-radius:12px;"></div>
                <div class="mb-3"><label class="form-label fw-semibold">Danh mục</label><select
                        th:field="*{category.id}" class="form-select" style="border-radius:12px;">
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Cat</option>
                    </select></div>
                <div class="mb-3" th:if="${book.image != null}"><label class="form-label fw-semibold">Ảnh hiện
                        tại</label><br><img th:src="@{'/images/' + ${book.image}}"
                        style="max-width:120px;border-radius:12px;box-shadow:0 4px 15px rgba(79,70,229,0.1);"></div>
                <div class="mb-3"><label class="form-label fw-semibold">Thay ảnh bìa</label><input type="file"
                        name="imageFile" class="form-control" accept="image/*" style="border-radius:12px;"></div>
                <div class="d-flex gap-2"><button type="submit" class="btn btn-admin-primary"><i
                            class="bi bi-check-circle"></i> Cập nhật</button><a th:href="@{/admin/books}"
                        class="btn btn-outline-secondary" style="border-radius:12px;">Hủy</a></div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>function toggleSidebar() { document.getElementById('adminSidebar').classList.toggle('show'); }</script>
</body>

</html>
