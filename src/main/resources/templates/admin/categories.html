<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/admin-layout :: adminHead}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>
    <div th:replace="~{fragments/admin-layout :: topbar}"></div>
    <div class="admin-content">
        <div class="admin-page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h3>🏷️ Quản lý danh mục</h3>
                <p>Quản lý các danh mục sách</p>
            </div>
            <a th:href="@{/admin/categories/add}" class="btn btn-admin-primary"><i class="bi bi-plus-circle"></i> Thêm
                danh mục</a>
        </div>
        <div th:if="${success}" class="alert alert-success" style="border-radius:12px;" th:text="${success}">OK</div>
        <div th:if="${error}" class="alert alert-danger" style="border-radius:12px;" th:text="${error}">Error</div>
        <div class="admin-table-wrapper">
            <div class="admin-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Tên danh mục</th>
                            <th>Số sách</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td th:text="${cat.id}">1</td>
                            <td class="fw-semibold" th:text="${cat.name}">Tên</td>
                            <td><span class="badge badge-admin" style="background:#ede9fe;color:#6366f1;"
                                    th:text="${bookCountMap[cat.id] != null ? bookCountMap[cat.id] : 0}">0</span></td>
                            <td>
                                <a th:href="@{'/admin/categories/edit/' + ${cat.id}}"
                                    class="btn btn-sm btn-outline-primary" style="border-radius:10px;"><i
                                        class="bi bi-pencil"></i></a>
                                <a th:href="@{'/admin/categories/delete/' + ${cat.id}}"
                                    class="btn btn-sm btn-outline-danger" style="border-radius:10px;"
                                    onclick="return confirm('Bạn chắc chắn muốn xóa danh mục này?')"><i
                                        class="bi bi-trash3"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>function toggleSidebar() { document.getElementById('adminSidebar').classList.toggle('show'); }</script>
    <script>document.getElementById('link-categories').classList.add('active');</script>
</body>

</html>
