<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/admin-layout :: adminHead}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>
    <div th:replace="~{fragments/admin-layout :: topbar}"></div>
    <div class="admin-content">
        <div class="admin-page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h3>📦 Quản lý đơn hàng</h3>
                <p>Xem và quản lý tất cả đơn hàng trong hệ thống</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <span class="badge bg-dark" th:text="'Tổng: ' + ${orders.size()} + ' đơn'">0 đơn</span>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success" style="border-radius:12px;" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" style="border-radius:12px;" th:text="${error}"></div>

        <!-- Status Filter -->
        <div class="card mb-4" style="border:none;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
            <div class="card-body d-flex flex-wrap gap-2 align-items-center">
                <span class="fw-semibold me-2"><i class="bi bi-funnel"></i> Lọc:</span>
                <a th:href="@{/admin/orders}" class="btn btn-sm"
                   th:classappend="${currentStatus == null} ? 'btn-dark' : 'btn-outline-secondary'"
                   style="border-radius:20px;">Tất cả</a>
                <a th:each="s : ${statuses}" th:href="@{/admin/orders(status=${s.name()})}"
                   class="btn btn-sm"
                   th:classappend="${currentStatus != null && currentStatus == s.name()} ? 'btn-dark' : 'btn-outline-secondary'"
                   style="border-radius:20px;" th:text="${s.displayName}">Status</a>
            </div>
        </div>

        <div class="admin-table-wrapper">
            <div class="admin-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Điện thoại</th>
                            <th>Ngày đặt</th>
                            <th>Tổng tiền</th>
                            <th>Thanh toán</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.id}">1</td>
                            <td>
                                <code th:if="${order.orderCode}" th:text="${order.orderCode}" style="font-size:0.8rem;"></code>
                                <span th:unless="${order.orderCode}" class="text-muted">—</span>
                            </td>
                            <td class="fw-semibold" th:text="${order.customerName}">Tên</td>
                            <td th:text="${order.phone}">SĐT</td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01</td>
                            <td class="price-admin"
                                th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${order.paymentMethod?.name() == 'COD'} ? 'bg-warning text-dark' : 'bg-info'"
                                      th:text="${order.paymentMethod != null ? order.paymentMethod.displayName : '—'}">TT</span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                       (${order.status.name() == 'CONFIRMED' || order.status.name() == 'PROCESSING'} ? 'bg-primary' :
                                                       (${order.status.name() == 'SHIPPING'} ? 'bg-info' :
                                                       (${order.status.name() == 'DELIVERED' || order.status.name() == 'COMPLETED'} ? 'bg-success' :
                                                       'bg-danger')))"
                                      th:text="${order.status.displayName}">Trạng thái</span>
                            </td>
                            <td>
                                <a th:href="@{'/admin/orders/' + ${order.id}}"
                                   class="btn btn-sm btn-outline-primary" style="border-radius:10px;">
                                    <i class="bi bi-eye"></i> Chi tiết
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="9" class="text-center text-muted py-4">Không có đơn hàng nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>function toggleSidebar() { document.getElementById('adminSidebar').classList.toggle('show'); }</script>
    <script>document.getElementById('link-orders').classList.add('active');</script>
</body>

</html>
