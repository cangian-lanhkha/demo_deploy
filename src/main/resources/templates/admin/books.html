<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/admin-layout :: adminHead}"></head>

<body>
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>
    <div th:replace="~{fragments/admin-layout :: topbar}"></div>
    <div class="admin-content">
        <div class="admin-page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h3>📚 Quản lý sách</h3>
                <p>Quản lý toàn bộ sách trong hệ thống</p>
            </div>
            <a th:href="@{/admin/books/add}" class="btn btn-admin-primary"><i class="bi bi-plus-circle"></i> Thêm sách
                mới</a>
        </div>
        <div th:if="${success}" class="alert alert-success" style="border-radius:12px;" th:text="${success}">OK</div>
        <div th:if="${error}" class="alert alert-danger" style="border-radius:12px;" th:text="${error}">Error</div>
        <div class="admin-table-wrapper">
            <div class="admin-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Ảnh</th>
                            <th>Tên sách</th>
                            <th>Tác giả</th>
                            <th>Giá</th>
                            <th>Tồn kho</th>
                            <th>Đã bán</th>
                            <th>Danh mục</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${books}">
                            <td><img th:if="${book.image != null}" th:src="@{'/images/' + ${book.image}}"
                                    class="admin-book-img">
                                <div th:unless="${book.image != null}" class="admin-book-img-placeholder"><i
                                        class="bi bi-image"></i></div>
                            </td>
                            <td class="fw-semibold" th:text="${book.title}">Tên</td>
                            <td th:text="${book.author}">Tác giả</td>
                            <td class="price-admin"
                                th:text="${book.price != null ? #numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT') + ' ₫' : '-'}">
                                0 ₫</td>
                            <td>
                                <span class="badge"
                                    th:classappend="${book.quantity != null && book.quantity > 10} ? 'bg-success' :
                                                       (${book.quantity != null && book.quantity > 0} ? 'bg-warning text-dark' : 'bg-danger')"
                                    th:text="${book.quantity != null ? book.quantity : 0}">0</span>
                                <small th:if="${book.quantity != null && book.quantity <= 10 && book.quantity > 0}"
                                    class="text-warning d-block">⚠ Sắp hết</small>
                                <small th:if="${book.quantity == null || book.quantity == 0}"
                                    class="text-danger d-block">Hết hàng</small>
                            </td>
                            <td>
                                <span class="text-muted"
                                    th:text="${book.soldCount != null ? book.soldCount : 0}">0</span>
                            </td>
                            <td><span class="badge badge-admin" style="background:#ede9fe;color:#6366f1;"
                                    th:if="${book.category != null}" th:text="${book.category.name}">Cat</span><span
                                    th:unless="${book.category != null}" class="text-muted">—</span></td>
                            <td>
                                <a th:href="@{'/admin/books/edit/' + ${book.id}}" class="btn btn-sm btn-outline-primary"
                                    style="border-radius:10px;"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{'/admin/books/delete/' + ${book.id}}"
                                    class="btn btn-sm btn-outline-danger" style="border-radius:10px;"
                                    onclick="return confirm('Bạn chắc chắn muốn xóa sách này?')"><i
                                        class="bi bi-trash3"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>function toggleSidebar() { document.getElementById('adminSidebar').classList.toggle('show'); }</script>
    <script>document.getElementById('link-books').classList.add('active');</script>
</body>

</html>
